<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>注文メニュー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <span>注文メニュー</span>
    <div class="table-number">
      <span>テーブル:</span>
      <input id="tableNumber" type="text" readonly />
    </div>
  </header>

  <div class="wrapper">
    <div id="leftMenu">
      <div class="category-buttons" id="categoryButtons"></div>
    </div>

    <div id="mainPane">
      <div id="menuContainer"></div>

      <button id="showOrderBtn" onclick="toggleOrderModal()">
        注文リスト <span id="orderBadge">0</span>
      </button>
      <button id="showHistoryBtn" onclick="toggleHistoryModal()">注文履歴</button>
      <button id="retryQueueBtn" onclick="retryPendingOrders()" style="display:none;">
        再送キュー 0
      </button>

      <div id="orderModal">
        <div class="modal-header">
          <button class="close-btn" type="button" aria-label="閉じる" onclick="toggleOrderModal()">×</button>
        </div>
        <h3>注文リスト</h3>
        <ul id="orderItems"></ul>
        <p>合計: <span id="totalPrice">0</span> 円</p>
        <button id="confirmOrderBtn" onclick="submitOrder()">注文を送信</button>
      </div>

      <div id="historyModal">
        <div class="modal-header">
          <button class="close-btn" type="button" aria-label="閉じる" onclick="toggleHistoryModal()">×</button>
        </div>
        <h3>注文履歴</h3>
        <ul id="historyItems"></ul>
        <p>合計: <span id="historyTotal">0</span> 円</p>
      </div>
    </div>

    <div id="optionModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <button class="close-btn" type="button" aria-label="閉じる" onclick="closeModal()">×</button>
        </div>
        <h3 id="optionTitle"></h3>
        <div id="optionImageWrap">
          <img id="optionImage" alt="" loading="lazy" referrerpolicy="no-referrer" />
        </div>
        <div id="optionList"></div>
        <div class="option-action-buttons">
          <button id="addOptionsBtn" class="option-action-btn option-action-primary" onclick="addOptionsToOrder()">オプションを選んで注文リストに追加</button>
          <button id="addWithoutOptionsBtn" class="option-action-btn option-action-secondary" onclick="addItemWithoutOptions()">注文リストに追加</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="shared-logic.js"></script>
  <script src="menu.js"></script>
  <div id="toastContainer" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
